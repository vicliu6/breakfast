<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>早餐規劃工具 | Breakfast Planner | Meal Planner</title>
<style>
  :root {
    --bg: #faf7f2;
    --card: #fff;
    --accent: #e07a3a;
    --accent2: #4a9e6e;
    --accent3: #3a7bd5;
    --text: #333;
    --muted: #888;
    --border: #e8e2d9;
    --tag-starch: #f5deb3;
    --tag-protein: #fbc2c2;
    --tag-fiber: #b8e6c8;
    --tag-drink: #b8d4f0;
    --prep: #fff3e0;
    --fresh: #e8f5e9;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "Noto Sans TC", "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
  .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
  h1 { text-align: center; font-size: 2em; margin: 20px 0 5px; }
  .subtitle { text-align: center; color: var(--muted); margin-bottom: 25px; font-size: 0.95em; }

  /* Language switcher */
  .lang-bar { display: flex; justify-content: flex-end; gap: 4px; margin-bottom: 10px; }
  .lang-btn { padding: 5px 14px; border: 1.5px solid var(--border); border-radius: 6px; background: var(--card); cursor: pointer; font-size: .85em; font-family: inherit; transition: all .15s; }
  .lang-btn:hover { border-color: var(--accent); }
  .lang-btn.active { border-color: var(--accent); background: #fef0e6; font-weight: 600; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 2px solid var(--border); }
  .tab { padding: 10px 22px; cursor: pointer; border: none; background: none; font-size: 1em; color: var(--muted); border-bottom: 3px solid transparent; transition: all .2s; font-family: inherit; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Generate section */
  .gen-controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
  .btn { padding: 12px 28px; border: none; border-radius: 10px; font-size: 1em; cursor: pointer; font-weight: 600; transition: all .2s; font-family: inherit; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), #c0612a); color: #fff; box-shadow: 0 3px 12px rgba(224,122,58,.3); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(224,122,58,.4); }
  .btn-secondary { background: var(--card); border: 2px solid var(--border); color: var(--text); }
  .btn-secondary:hover { border-color: var(--accent); }
  .btn-green { background: linear-gradient(135deg, var(--accent2), #3a8a5e); color: #fff; }
  .btn-green:hover { transform: translateY(-1px); }
  .btn-sm { padding: 6px 14px; font-size: .85em; border-radius: 6px; }

  /* Filter chips */
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .chip { padding: 5px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--card); cursor: pointer; font-size: .85em; transition: all .15s; user-select: none; }
  .chip.active { border-color: var(--accent); background: #fef0e6; }
  .chip:hover { border-color: var(--accent); }

  /* Meal cards */
  .meals-grid { display: grid; gap: 16px; }
  .meal-card { background: var(--card); border-radius: 14px; padding: 20px; box-shadow: 0 2px 10px rgba(0,0,0,.05); border-left: 5px solid var(--accent); }
  .meal-card h3 { font-size: 1.15em; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .meal-num { background: var(--accent); color: #fff; width: 28px; height: 28px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: .85em; flex-shrink: 0; }
  .meal-type { font-size: .75em; padding: 2px 10px; border-radius: 10px; font-weight: 500; }
  .type-prepped { background: var(--prep); color: #b36b00; }
  .type-fresh { background: var(--fresh); color: #2e7d32; }
  .type-quick { background: #e3f2fd; color: #1565c0; }
  .meal-items { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
  .item-tag { padding: 3px 10px; border-radius: 6px; font-size: .82em; }
  .tag-starch { background: var(--tag-starch); }
  .tag-protein { background: var(--tag-protein); }
  .tag-fiber { background: var(--tag-fiber); }
  .tag-drink { background: var(--tag-drink); }
  .meal-detail { font-size: .9em; color: #555; margin-top: 8px; }
  .meal-detail summary { cursor: pointer; color: var(--accent); font-weight: 500; }
  .meal-detail .content { margin-top: 8px; padding: 10px; background: #faf7f2; border-radius: 8px; white-space: pre-line; }
  .meal-card .swap-btn { float: right; background: none; border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; cursor: pointer; font-size: .8em; color: var(--muted); }
  .meal-card .swap-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Shopping list */
  .shopping-section { margin-top: 24px; }
  .shopping-section h2 { font-size: 1.3em; margin-bottom: 12px; }
  .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .shop-cat { background: var(--card); border-radius: 10px; padding: 14px; box-shadow: 0 1px 6px rgba(0,0,0,.04); }
  .shop-cat h4 { font-size: .95em; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .shop-cat ul { list-style: none; }
  .shop-cat li { padding: 3px 0; font-size: .9em; display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .shop-cat li::before { content: "☐"; color: var(--muted); }
  .shop-cat li.checked::before { content: "☑"; color: var(--accent2); }

  /* Recipe cards */
  .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
  .recipe-card { background: var(--card); border-radius: 14px; overflow: hidden; box-shadow: 0 2px 10px rgba(0,0,0,.05); transition: transform .15s; }
  .recipe-card:hover { transform: translateY(-2px); }
  .recipe-card .recipe-img { width: 100%; height: 180px; object-fit: cover; display: block; }
  .recipe-card .recipe-body { padding: 14px 18px 18px; }
  .recipe-card h3 { font-size: 1.05em; margin-bottom: 6px; }
  .recipe-meta { display: flex; gap: 10px; margin-bottom: 8px; font-size: .8em; color: var(--muted); }
  .recipe-ingredients { font-size: .85em; color: #555; margin-bottom: 8px; }
  .recipe-steps { font-size: .85em; white-space: pre-line; display: none; padding-top: 8px; }
  .recipe-card.expanded .recipe-steps { display: block; }
  .recipe-toggle { background: none; border: none; color: var(--accent); cursor: pointer; font-size: .85em; font-family: inherit; }

  /* Mix and match */
  .mix-section { margin-bottom: 20px; }
  .mix-section h3 { font-size: 1em; margin-bottom: 8px; padding: 8px 12px; border-radius: 8px; }
  .mix-section h3.starch-h { background: var(--tag-starch); }
  .mix-section h3.protein-h { background: var(--tag-protein); }
  .mix-section h3.fiber-h { background: var(--tag-fiber); }
  .mix-section h3.drink-h { background: var(--tag-drink); }
  .mix-items { display: flex; flex-wrap: wrap; gap: 8px; }
  .mix-item { padding: 8px 16px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--card); cursor: pointer; font-size: .9em; transition: all .15s; user-select: none; }
  .mix-item:hover { border-color: var(--accent); }
  .mix-item.selected { border-color: var(--accent); background: #fef0e6; font-weight: 500; }

  /* Days selector */
  .days-selector { display: flex; gap: 6px; align-items: center; }
  .days-selector label { font-size: .9em; }
  .days-selector select { padding: 6px 10px; border-radius: 6px; border: 1.5px solid var(--border); font-family: inherit; }

  /* Print */
  @media print {
    .tabs, .gen-controls, .btn, .swap-btn, .filters, .chip, .recipe-toggle, .lang-bar { display: none !important; }
    .tab-content { display: block !important; }
    body { background: #fff; }
  }

  /* Responsive */
  @media (max-width: 600px) {
    .container { padding: 12px; }
    h1 { font-size: 1.5em; }
    .btn { padding: 10px 18px; font-size: .9em; }
    .recipe-grid { grid-template-columns: 1fr; }
  }

  .week-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  .day-label { font-weight: 600; color: var(--accent); font-size: .9em; margin-bottom: 6px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 3em; margin-bottom: 10px; }
</style>
</head>

  </div>

  <!-- Tab 3: Mix and Match -->

    </div>
    <div class="mix-section">
      <h3 class="drink-h" id="mixDrinkTitle">🥛 飲品類</h3>
      <div class="mix-items" id="mixDrink"></div>
    </div>
    <div style="margin-top:16px;">
      <button class="btn btn-green" onclick="generateMixList()" id="btnMixGen">📝 生成備料清單</button>
    </div>
    <div id="mixShoppingOutput" style="margin-top:16px;"></div>
  </div>

  <!-- Tab 4: Shopping -->

</div>

// ============ GENERATE ============
function getFiltered() {
  let pool = [...allOptions];
  if (activeFilter === 'prepped') pool = pool.filter(r => r.type === 'prepped');
  else if (activeFilter === 'fresh') pool = pool.filter(r => r.type === 'fresh');
  else if (activeFilter === 'quick') pool = pool.filter(r => r.type === 'quick' || (r.time && r.time <= 5));
  return pool;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickN(n) {
  const pool = getFiltered();
  if (pool.length === 0) return [];
  const shuffled = shuffle(pool);
  const picked = [];
  const used = new Set();
  for (const item of shuffled) {
    if (picked.length >= n) break;
    const key = L(item, 'name') || item.id;
    if (!used.has(key)) {
      used.add(key);
      picked.push(item);
    }
  }
  while (picked.length < n) {
    picked.push(pool[Math.floor(Math.random() * pool.length)]);
  }
  return picked;
}

function generate() {
  const n = parseInt(document.getElementById('dayCount').value);
  currentMeals = pickN(n);
  renderMeals();
  renderGeneratedShopping();
  updateMasterShopping();
}

function swapMeal(idx) {
  const pool = getFiltered();
  const current = currentMeals[idx];
  const currentName = L(current, 'name');
  const others = pool.filter(p => L(p, 'name') !== currentName);
  if (others.length > 0) {
    currentMeals[idx] = others[Math.floor(Math.random() * others.length)];
  }
  renderMeals();
  renderGeneratedShopping();
  updateMasterShopping();
}

  if (type === 'prepped') return `<span class="meal-type type-prepped">${t('typePrepped')}</span>`;

  return `<span class="meal-type type-quick">${t('typeQuick')}</span>`;
}

function tagClass(cat) {
  if (cat === 'starch') return 'tag-starch';
  if (cat === 'protein') return 'tag-protein';
  if (cat === 'fiber') return 'tag-fiber';
  return 'tag-drink';
}

function renderMeals() {

  if (currentMeals.length === 0) {

  el.innerHTML = '<div class="meals-grid">' + currentMeals.map((m, i) => {
    const isRecipe = !!m.id; // recipes have id
    const name = L(m, 'name');
    let tagsHtml = '';
    if (m.tags) {
      for (const [cat, items] of Object.entries(m.tags)) {
        items.forEach(item => {
          tagsHtml += `<span class="item-tag ${tagClass(cat)}">${tItem(item)}</span>`;
        });
      }
    }
    // Quick combos have starch/protein/fiber/drink in localized data
    const loc = m[currentLang] || m['zh'];
    if (loc.starch) tagsHtml += `<span class="item-tag tag-starch">${loc.starch}</span>`;
    if (loc.protein) tagsHtml += `<span class="item-tag tag-protein">${loc.protein}</span>`;
    if (loc.fiber) tagsHtml += `<span class="item-tag tag-fiber">${loc.fiber}</span>`;
    if (loc.drink) tagsHtml += `<span class="item-tag tag-drink">${loc.drink}</span>`;

    let detail = '';
    if (isRecipe && L(m, 'steps')) {
      detail = `<details class="meal-detail"><summary>${t('viewSteps')}</summary>
        <div class="content"><strong>${t('ingredients')}：</strong>${L(m, 'ingredients')}\n\n<strong>${t('steps')}：</strong>\n${L(m, 'steps')}\n\n<strong>${t('note')}：</strong>${L(m, 'prepNote')}</div></details>`;
    } else if (L(m, 'prepNote')) {
      detail = `<div style="font-size:.85em;color:var(--muted);margin-top:4px;">${L(m, 'prepNote')}</div>`;
    }

    const dayLabel = dayNames[i] || t('dayN').replace('{n}', i + 1);

    return `<div class="meal-card">
      <button class="swap-btn" onclick="swapMeal(${i})">${t('swap')}</button>

  }).join('') + '</div>';
}

  '堅果種子': ['堅果','杏仁片','杏仁','南瓜籽','奇亞籽','果乾'],
};

function collectShopping(meals) {
  const map = {};
  meals.forEach(m => {
    (m.shopping || []).forEach(item => {
      map[item] = (map[item] || 0) + 1;
    });
  });
  const result = {};
  for (const [cat, items] of Object.entries(categories)) {
    const found = items.filter(i => map[i]);
    if (found.length > 0) {
      result[cat] = found.map(i => ({ name: i, count: map[i] }));
    }
  }
  const allCat = Object.values(categories).flat();
  const uncategorized = Object.keys(map).filter(k => !allCat.includes(k));
  if (uncategorized.length > 0) {
    result['其他'] = uncategorized.map(i => ({ name: i, count: map[i] }));
  }
  return result;
}

function renderShoppingHtml(shopping) {
  if (Object.keys(shopping).length === 0) return '';
  return `<div class="shopping-section"><h2>${t('shoppingTitle')}</h2><div class="shop-grid">` +
    Object.entries(shopping).map(([cat, items]) =>
      `<div class="shop-cat"><h4>${tCat(cat)}</h4><ul>${items.map(i =>
        `<li onclick="this.classList.toggle('checked')">${tItem(i.name)}${i.count > 1 ? ' ×' + i.count : ''}</li>`
      ).join('')}</ul></div>`
    ).join('') + '</div></div>';
}

// ============ EXPORT ============
function exportText() {
  if (currentMeals.length === 0) { alert(t('alertNoMeals')); return; }
  const dayNames = t('dayNames');
  let text = t('exportTitle') + '\n' + '═'.repeat(30) + '\n\n';
  currentMeals.forEach((m, i) => {
    const dayLabel = dayNames[i] || t('dayN').replace('{n}', i + 1);
    text += `${dayLabel}：${L(m, 'name')}\n`;
    if (L(m, 'ingredients')) text += `  ${t('ingredients')}：${L(m, 'ingredients')}\n`;
    if (L(m, 'prepNote')) text += `  ${t('note')}：${L(m, 'prepNote')}\n`;
    text += '\n';
  });
  const shopping = collectShopping(currentMeals);
  if (Object.keys(shopping).length > 0) {
    text += t('shoppingTitle') + '\n' + '─'.repeat(20) + '\n';
    for (const [cat, items] of Object.entries(shopping)) {
      text += `\n【${tCat(cat)}】\n`;
      items.forEach(i => { text += `  ☐ ${tItem(i.name)}${i.count > 1 ? ' ×' + i.count : ''}\n`; });
    }
  }
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btnExport');
    const orig = btn.textContent;
    btn.textContent = t('copied');
    setTimeout(() => btn.textContent = t('btnExport'), 1500);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert(t('copied'));
  });
}
